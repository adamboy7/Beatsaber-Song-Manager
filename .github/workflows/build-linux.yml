name: Build Linux executable

# PyInstaller can't cross-compile, so the Linux binary is built here on an
# Ubuntu runner. Pinned to ubuntu-22.04 (glibc 2.35) so the result runs on
# that glibc and newer — the broadest practical compatibility.
#
# Trigger manually from the Actions tab (workflow_dispatch), or automatically
# when you push a version tag like v1.0.0 (which also attaches the binary to
# the GitHub Release).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to attach the binary to a Release on tag pushes

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install system deps (Tk for the GUI)
        # Tkinter is a system package, not a pip wheel. ffmpeg/libmpv are NOT
        # bundled by design — end users install those on their own machine.
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-tk

      - name: Verify tkinter is importable
        run: python3 -c "import tkinter; print('tkinter', tkinter.TkVersion)"

      - name: Install Python dependencies
        # audioop-lts targets Python 3.13+ (where audioop was removed); on the
        # runner's 3.10 audioop is built in, so drop that one line and install
        # the rest plus PyInstaller.
        run: |
          python3 -m pip install --upgrade pip
          grep -v -i "audioop-lts" requirements.txt > reqs.ci.txt
          python3 -m pip install -r reqs.ci.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          python3 -m PyInstaller Browser.linux.spec --noconfirm
          chmod +x dist/BeatSaberSongManager
          file dist/BeatSaberSongManager

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeatSaberSongManager-linux-x86_64
          path: dist/BeatSaberSongManager
          if-no-files-found: error

      - name: Attach to Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BeatSaberSongManager
