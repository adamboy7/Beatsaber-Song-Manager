name: Build Windows executable

# Builds the Windows .exe with PyInstaller on a Windows runner, using the
# hand-maintained Browser.spec. Mirrors build-linux.yml: run it manually from
# the Actions tab, or push a v* tag (which also attaches the .exe to the
# GitHub Release).
#
# Note: ffmpeg and libmpv are NOT bundled by design — end users place them next
# to the app or on PATH (the app also offers to download them on first use).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to attach the binary to a Release on tag pushes

jobs:
  build:
    runs-on: windows-latest

    # Use bash on the Windows runner (Git Bash is preinstalled) so the
    # requirements filtering matches the Linux workflow exactly.
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        # 3.12 matches local development; its Windows build bundles Tk, so no
        # extra system package is needed for the tkinter GUI.
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tkinter is importable
        run: python -c "import tkinter; print('tkinter', tkinter.TkVersion)"

      - name: Install Python dependencies
        # audioop-lts targets Python 3.13+ (where audioop was removed); on 3.12
        # audioop is built in, so drop that line and install the rest plus
        # PyInstaller.
        run: |
          python -m pip install --upgrade pip
          grep -v -i "audioop-lts" requirements.txt > reqs.ci.txt
          python -m pip install -r reqs.ci.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller Browser.spec --noconfirm
          ls -l dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeatSaberSongManager-windows-x86_64
          path: dist/BeatSaberSongManager.exe
          if-no-files-found: error

      - name: Attach to Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BeatSaberSongManager.exe
